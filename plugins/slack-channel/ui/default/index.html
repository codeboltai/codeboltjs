<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Slack Channel</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 24px;
    min-height: 100vh;
  }
  h2 {
    font-size: 1.25rem;
    margin-bottom: 20px;
    color: #cba6f7;
  }
  .form-group {
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-size: 0.85rem;
    margin-bottom: 6px;
    color: #a6adc8;
  }
  input, select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #45475a;
    border-radius: 8px;
    background: #313244;
    color: #cdd6f4;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus {
    border-color: #cba6f7;
  }
  input::placeholder {
    color: #6c7086;
  }
  .hint {
    font-size: 0.75rem;
    color: #6c7086;
    margin-top: 4px;
  }
  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  button {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .btn-connect {
    background: #a6e3a1;
    color: #1e1e2e;
  }
  .btn-disconnect {
    background: #f38ba8;
    color: #1e1e2e;
  }
  .status-bar {
    margin-top: 20px;
    padding: 12px 16px;
    border-radius: 8px;
    background: #313244;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-disconnected { background: #6c7086; }
  .dot-connecting   { background: #f9e2af; }
  .dot-connected    { background: #a6e3a1; }
  .dot-error        { background: #f38ba8; }
  .dot-reconnecting { background: #f9e2af; }
  .error-msg {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(243,139,168,0.15);
    color: #f38ba8;
    font-size: 0.85rem;
    display: none;
  }
</style>
</head>
<body>
  <h2>Slack Channel</h2>

  <div class="form-group">
    <label for="appToken">App Token</label>
    <input type="password" id="appToken" placeholder="xapp-..." />
    <div class="hint">App-Level Token for Socket Mode (starts with xapp-)</div>
  </div>

  <div class="form-group">
    <label for="botToken">Bot Token</label>
    <input type="password" id="botToken" placeholder="xoxb-..." />
    <div class="hint">Bot User OAuth Token (starts with xoxb-)</div>
  </div>

  <div class="form-group">
    <label for="agentId">Agent ID <span style="color:#6c7086">(optional)</span></label>
    <input type="text" id="agentId" placeholder="Target agent ID" />
  </div>

  <div class="form-group">
    <label for="threadStrategy">Thread Strategy</label>
    <select id="threadStrategy">
      <option value="per-user">Per User</option>
      <option value="per-channel">Per Channel</option>
      <option value="single">Single Thread</option>
    </select>
  </div>

  <div class="btn-row">
    <button class="btn-connect" id="btnConnect" onclick="doConnect()">Connect</button>
    <button class="btn-disconnect" id="btnDisconnect" onclick="doDisconnect()" disabled>Disconnect</button>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="status-dot dot-disconnected" id="statusDot"></span>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="error-msg" id="errorMsg"></div>

<script>
  // Communication bridge with the plugin host
  const vscode = (typeof acquireVsCodeApi === "function") ? acquireVsCodeApi() : null;

  function sendToPlugin(msg) {
    if (vscode) {
      vscode.postMessage(msg);
    } else if (window.parent && window.parent !== window) {
      window.parent.postMessage(msg, "*");
    }
  }

  // --- Actions ---

  function doConnect() {
    const appToken = document.getElementById("appToken").value.trim();
    const botToken = document.getElementById("botToken").value.trim();
    const agentId = document.getElementById("agentId").value.trim();
    const threadStrategy = document.getElementById("threadStrategy").value;

    if (!appToken) {
      showError("App Token is required");
      return;
    }
    if (!botToken) {
      showError("Bot Token is required");
      return;
    }

    hideError();
    setStatus("connecting", "Connecting...");
    document.getElementById("btnConnect").disabled = true;

    sendToPlugin({
      type: "connect",
      appToken: appToken,
      botToken: botToken,
      agentId: agentId || undefined,
      threadStrategy: threadStrategy,
    });
  }

  function doDisconnect() {
    sendToPlugin({ type: "disconnect" });
    setStatus("disconnected", "Disconnected");
  }

  // --- Status management ---

  function setStatus(status, label) {
    var dot = document.getElementById("statusDot");
    var text = document.getElementById("statusText");
    dot.className = "status-dot dot-" + status;
    text.textContent = label || status.charAt(0).toUpperCase() + status.slice(1);

    var isConnected = (status === "connected");
    document.getElementById("btnConnect").disabled = isConnected;
    document.getElementById("btnDisconnect").disabled = !isConnected && status !== "reconnecting";
  }

  function showError(msg) {
    var el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.style.display = "block";
    document.getElementById("btnConnect").disabled = false;
  }

  function hideError() {
    document.getElementById("errorMsg").style.display = "none";
  }

  // --- Incoming messages from plugin ---

  function handlePluginMessage(data) {
    if (!data || !data.type) return;

    if (data.type === "status") {
      var labels = {
        connected: data.botUsername ? "Connected as " + data.botUsername : "Connected",
        disconnected: "Disconnected",
        connecting: "Connecting...",
        reconnecting: "Reconnecting...",
      };
      setStatus(data.status, labels[data.status] || data.status);
    } else if (data.type === "error") {
      showError(data.message || "Unknown error");
      setStatus("error", "Error");
    }
  }

  // Listen for messages from host
  window.addEventListener("message", function (event) {
    handlePluginMessage(event.data);
  });

  // Request current status on load
  sendToPlugin({ type: "credentials" });
</script>
</body>
</html>
