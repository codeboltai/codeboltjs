<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WhatsApp Channel Settings</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 24px;
    min-height: 100vh;
  }

  h2 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #a6e3a1;
  }

  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: #bac2de;
  }

  .hint {
    font-size: 11px;
    color: #6c7086;
    margin-top: 4px;
  }

  input, select {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    border: 1px solid #45475a;
    border-radius: 8px;
    background: #313244;
    color: #cdd6f4;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus {
    border-color: #a6e3a1;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  button {
    flex: 1;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s, background 0.2s;
  }

  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-connect {
    background: #a6e3a1;
    color: #1e1e2e;
  }

  .btn-connect:hover:not(:disabled) {
    background: #94e2d5;
  }

  .btn-disconnect {
    background: #f38ba8;
    color: #1e1e2e;
  }

  .btn-disconnect:hover:not(:disabled) {
    background: #eba0ac;
  }

  .status-bar {
    margin-top: 20px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
  }

  .status-disconnected {
    background: #45475a;
    color: #a6adc8;
  }

  .status-connected {
    background: rgba(166, 227, 161, 0.15);
    color: #a6e3a1;
  }

  .status-connecting {
    background: rgba(249, 226, 175, 0.15);
    color: #f9e2af;
  }

  .status-error {
    background: rgba(243, 139, 168, 0.15);
    color: #f38ba8;
  }

  .qr-section {
    margin-top: 20px;
    display: none;
  }

  .qr-section.visible {
    display: block;
  }

  .qr-label {
    font-size: 13px;
    font-weight: 600;
    color: #bac2de;
    margin-bottom: 8px;
  }

  .qr-display {
    background: #11111b;
    border: 1px solid #45475a;
    border-radius: 8px;
    padding: 16px;
    overflow-x: auto;
  }

  .qr-display pre {
    font-family: 'Courier New', Courier, monospace;
    font-size: 5px;
    line-height: 5px;
    letter-spacing: 1px;
    color: #cdd6f4;
    white-space: pre;
    margin: 0;
    text-align: center;
  }
</style>
</head>
<body>

<h2>WhatsApp Channel</h2>

<div class="form-group">
  <label for="authDir">Auth Directory</label>
  <input type="text" id="authDir" placeholder=".whatsapp-auth (relative to plugin directory)" />
  <div class="hint">Leave empty to use the default: &lt;pluginDir&gt;/.whatsapp-auth</div>
</div>

<div class="form-group">
  <label for="agentId">Agent ID</label>
  <input type="text" id="agentId" placeholder="Enter the agent ID to route messages to" />
</div>

<div class="form-group">
  <label for="threadStrategy">Thread Strategy</label>
  <select id="threadStrategy">
    <option value="single">Single thread</option>
    <option value="per-user" selected>Per user</option>
    <option value="per-conversation">Per conversation</option>
    <option value="per-message">Per message</option>
  </select>
</div>

<div class="actions">
  <button class="btn-connect" id="btnConnect">Connect</button>
  <button class="btn-disconnect" id="btnDisconnect" disabled>Disconnect</button>
</div>

<div class="status-bar status-disconnected" id="statusBar">Disconnected</div>

<div class="qr-section" id="qrSection">
  <div class="qr-label">Scan this QR code with WhatsApp to pair your device:</div>
  <div class="qr-display">
    <pre id="qrCode"></pre>
  </div>
</div>

<script>
  // --- Elements ---
  const authDirInput      = document.getElementById('authDir');
  const agentIdInput      = document.getElementById('agentId');
  const threadStrategySel = document.getElementById('threadStrategy');
  const btnConnect        = document.getElementById('btnConnect');
  const btnDisconnect     = document.getElementById('btnDisconnect');
  const statusBar         = document.getElementById('statusBar');
  const qrSection         = document.getElementById('qrSection');
  const qrCode            = document.getElementById('qrCode');

  let currentStatus = 'disconnected';

  // --- Connect ---
  btnConnect.addEventListener('click', () => {
    const authDir = authDirInput.value.trim();
    const agentId = agentIdInput.value.trim();
    const threadStrategy = threadStrategySel.value;

    codeboltPlugin.sendMessage({
      type: 'connect',
      config: {
        credentials: { authDir },
        agentId,
        threadStrategy,
      },
    });

    setStatus('connecting', 'Connecting...');
    btnConnect.disabled = true;
    hideQR();
  });

  // --- Disconnect ---
  btnDisconnect.addEventListener('click', () => {
    codeboltPlugin.sendMessage({ type: 'disconnect' });
    btnDisconnect.disabled = true;
    hideQR();
  });

  // --- Receive messages from plugin ---
  codeboltPlugin.onMessage((message) => {
    if (message.type === 'status') {
      setStatus(message.status, message.message);
      // Hide QR when connected or disconnected
      if (message.status === 'connected' || message.status === 'disconnected') {
        hideQR();
      }
    } else if (message.type === 'qr') {
      showQR(message.qr);
    }
  });

  // --- QR code display ---
  function showQR(qr) {
    qrCode.textContent = qr;
    qrSection.classList.add('visible');
  }

  function hideQR() {
    qrSection.classList.remove('visible');
    qrCode.textContent = '';
  }

  // --- Status display ---
  function setStatus(status, message) {
    currentStatus = status;
    statusBar.className = 'status-bar status-' + status;

    switch (status) {
      case 'connected':
        statusBar.textContent = 'Connected' + (message ? ' -- ' + message : '');
        btnConnect.disabled = true;
        btnDisconnect.disabled = false;
        break;
      case 'connecting':
        statusBar.textContent = message || 'Connecting...';
        btnConnect.disabled = true;
        btnDisconnect.disabled = false;
        break;
      case 'disconnected':
        statusBar.textContent = message || 'Disconnected';
        btnConnect.disabled = false;
        btnDisconnect.disabled = true;
        break;
      case 'error':
        statusBar.textContent = 'Error' + (message ? ': ' + message : '');
        btnConnect.disabled = false;
        btnDisconnect.disabled = true;
        break;
    }
  }
</script>

</body>
</html>
