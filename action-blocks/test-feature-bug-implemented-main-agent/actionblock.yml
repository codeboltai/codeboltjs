name: test-feature-bug-implemented-main-agent
description: Test a feature or bug fix implemented by the main agent through a black-box Agentic TUI tester loop.
version: 1.0.4
unique_id: test-feature-bug-implemented-main-agent
entryPoint: dist/index.js
auther: ravi
inputs:
  - name: spec
    type: object
    description: Optional verifier hints describing the feature or bug fix, expected behavior, user workflow, and acceptance criteria. Command strings are ignored and setup/build/start are handled by wrapper scripts.
    required: false
outputs:
  - name: success
    type: boolean
    description: Whether the mini-agent verified the feature or bug fix successfully through Agentic TUI behavior.
  - name: result
    type: object
    description: Structured verifier result with startup-message status, lifecycle steps, Agentic TUI temp-project session details, mini-agent report, issues, and recommendations.
  - name: verification
    type: object
    description: Verification checks performed by the ActionBlock.
  - name: filesCreated
    type: array
    description: Any test artifacts or report files created during execution.
  - name: error
    type: string
    description: Structured error message when the ActionBlock fails.
metadata:
  displayName: Test Feature Bug Implemented Main Agent
  fullName: Test Feature Bug Implemented Main Agent
  category: testing
  sourceLanguage: TypeScript
  runtimeEntry: dist/index.js
