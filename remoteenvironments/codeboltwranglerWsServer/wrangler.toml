name = "codebolt-wrangler-ws"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Environment variables
ENVIRONMENT = "development"

# Durable Objects configuration
[durable_objects]
bindings = [
  { name = "PROXY_HUB", class_name = "ProxyHub" }
]

# Migration configuration
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ProxyHub"]

[[kv_namespaces]]
binding = "CHAT_STORE"
id = "61074f06f6dd4bfaa14fe51a9d0563cd"
preview_id = "50783270715f4884a2be4c4a4a840c3a"

# Environment-specific configurations
[env.staging]
name = "codebolt-wrangler-ws-staging"
vars = { ENVIRONMENT = "staging" }

[env.production]
name = "codebolt-wrangler-ws-production"
vars = { ENVIRONMENT = "production" }
