name: e2b-remote-provider
version: 2.0.0
description: E2B Remote Provider for CodeBolt (plugin-based)
type: provider
entrypoint: dist/index.js
runtime: node
config:
  pluginPort: 3100
  e2bApiKey: ""
  sandboxTemplate: "26sv45vrb3u0dharhkyn"
  autoStopInterval: 0
  timeouts:
    codeboltStartup: 120000
    wsConnection: 30000
    cleanup: 15000
