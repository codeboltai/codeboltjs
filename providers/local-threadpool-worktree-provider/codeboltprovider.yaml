name: local-threadpool-worktree-provider
unique_id: local-threadpool-worktree-provider
author: ravi
version: 1.1.3
description: Local threadpool environment provider that executes in a server-managed workspace
type: provider
entrypoint: dist/index.js
runtime: node
supportedSyncModes:
  - git
  - workspace_sync
  - none
defaultSyncMode: git
config:
  agentServerPort: 3001
  agentServerHost: localhost
  cleanupEnvironmentPath: true
  timeouts:
    agentServerStartup: 30000
    wsConnection: 10000
    gitOperations: 30000
    cleanup: 15000
