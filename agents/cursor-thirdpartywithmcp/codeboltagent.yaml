title: Cursor Agent
version: 1.0.1
unique_id: cursor-thirdpartywithmcp
initial_message: |
  I'm a Cursor agent with full access to Codebolt tools via MCP.
  Cursor can use Codebolt's filesystem, terminal, git, browser,
  memory, tasks, threads, and more - all routed through the Codebolt platform.
  Tell me what you'd like to work on.
description: Cursor Agent with Codebolt tools exposed via MCP server. Cursor gets access to all Codebolt platform capabilities.
tags:
  - coding
  - cli
  - cursor
  - mcp
  - thirdparty
longDescription: |
  This agent starts a Codebolt MCP server in-process, then spawns Cursor Agent CLI
  with --mcp-config pointing to it. Cursor discovers all Codebolt tools
  (filesystem, terminal, git, browser, memory, tasks, etc.) via MCP and can
  use them during execution. All tool calls flow through the Codebolt platform
  with UI confirmations and notifications.
avatarSrc: https://placehold.co/200x200
avatarFallback: CR
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - python
      - go
      - rust
      - java
    supportedframeworks:
      - react
      - node
      - express
      - nextjs
    supportRemix: true
  defaultagentllm:
    strict: false
    modelorder:
      - composer-1.5
      - gpt-5.3-codex
      - claude-sonnet-4-6
actions:
  - name: Plan
    description: Enter plan mode
    detailDescription: Run Cursor in planning mode
    actionPrompt: /plan
  - name: Ask
    description: Ask a question
    detailDescription: Run Cursor in ask mode (no code changes)
    actionPrompt: /ask
supportRemix: true
author: codebolt
