title:  Orchestrator
version: 1.0.3
unique_id: orchestrator
initial_message: I am the Main Orchestrator agent. I analyze your requirements, create detailed plans, generate specifications, break work into jobs, and coordinate worker agents to execute them in parallel.
description: Orchestrator agent that plans, creates specifications, generates jobs, and coordinates parallel worker agent execution on the Codebolt platform.
tags:
  - orchestrator
  - planning
  - multi-agent
  - coordination
longDescription: |
  The Main Orchestrator is a multi-phase coordination agent for the Codebolt platform.
  It receives user requirements and drives them through a full lifecycle:
  1. Planning - Deep analysis and comprehensive plan creation using read-only tools
  2. Specification - Generates detailed specifications from the plan
  3. Job Creation - Breaks specifications into discrete, dependency-aware jobs
  4. Job Execution - Launches and coordinates worker agents to execute jobs in parallel,
     respecting dependency ordering and handling completion events via a yield-and-resume loop.
  The orchestrator never implements code directly — it delegates all implementation
  to worker agents via background threads.
avatarSrc: https://placehold.co/200x200
avatarFallback: MO
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - web
      - python
      - go
      - java
      - rust
    supportedframeworks:
