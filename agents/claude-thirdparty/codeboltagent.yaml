title: Claude Third-Party Agent
version: 1.0.0
unique_id: claude-thirdparty
initial_message: |
  I'm a Claude Code agent powered by @codebolt/thirdpartyagents.
  I run Claude CLI as a child process and stream results through Codebolt.
  Tell me what you'd like to work on.
description: Example agent using @codebolt/thirdpartyagents to run Claude Code CLI with automatic Codebolt communication.
tags:
  - coding
  - cli
  - claude
  - thirdparty
longDescription: |
  This agent demonstrates the @codebolt/thirdpartyagents library by running
  Claude Code CLI as a child process. The library automatically handles all
  Codebolt communication (notifications, tool dispatching, etc.) while also
  streaming messages for optional additional processing.
avatarSrc: https://placehold.co/200x200
avatarFallback: CT
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - python
      - go
      - rust
      - java
    supportedframeworks:
      - react
      - node
      - express
      - nextjs
    supportRemix: true
  defaultagentllm:
    strict: false
    modelorder:
      - claude-sonnet-4-20250514
      - claude-3-5-sonnet-20241022
actions:
  - name: Plan
    description: Enter plan mode
    detailDescription: Run Claude in planning mode (no tool execution)
    actionPrompt: /plan
  - name: Execute
    description: Execute a task
    detailDescription: Run Claude with full permissions
    actionPrompt: Let's build this
supportRemix: true
author: codebolt
