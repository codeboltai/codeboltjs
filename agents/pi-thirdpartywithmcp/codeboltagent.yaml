title: Pi AI Agent
version: 1.0.1
unique_id: pi-thirdpartywithmcp
initial_message: |
  I'm a Pi AI agent with full access to Codebolt tools via MCP.
  Pi can use Codebolt's filesystem, terminal, git, browser,
  memory, tasks, threads, and more - all routed through the Codebolt platform.
  Tell me what you'd like to work on.
description: Pi AI Agent with Codebolt tools exposed via MCP server. Pi gets access to all Codebolt platform capabilities.
tags:
  - coding
  - cli
  - pi
  - mcp
  - thirdparty
longDescription: |
  This agent starts a Codebolt MCP server in-process, then spawns Pi AI Agent CLI
  with --mcp-config pointing to it. Pi discovers all Codebolt tools
  (filesystem, terminal, git, browser, memory, tasks, etc.) via MCP and can
  use them during execution. All tool calls flow through the Codebolt platform
  with UI confirmations and notifications.
avatarSrc: https://placehold.co/200x200
avatarFallback: PI
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - python
      - go
      - rust
      - java
    supportedframeworks:
      - react
      - node
      - express
      - nextjs
    supportRemix: true
  defaultagentllm:
    strict: false
    modelorder:
      - xai/grok-4
supportRemix: true
author: codebolt
