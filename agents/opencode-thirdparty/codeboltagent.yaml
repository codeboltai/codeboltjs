title: OpenCode Third-Party Agent
version: 1.0.0
unique_id: opencode-thirdparty
initial_message: |
  I'm an OpenCode agent powered by @codebolt/thirdpartyagents.
  I run OpenCode CLI as a child process and stream results through Codebolt.
  Tell me what you'd like to work on.
description: Agent using @codebolt/thirdpartyagents to run OpenCode CLI with automatic Codebolt communication.
tags:
  - coding
  - cli
  - opencode
  - thirdparty
longDescription: |
  This agent uses the @codebolt/thirdpartyagents library to run
  OpenCode CLI as a child process. The library automatically handles all
  Codebolt communication (notifications, text streaming, etc.) while also
  streaming messages for optional additional processing.
