title: Artifact Agent
version: 1.0.0
unique_id: artifact-agent
initial_message: Artifact Agent creates static site artifacts for integration testing.
description: Artifact Agent creates a small static site artifact through the Codebolt artifact API.
tags:
  - artifact
  - static-site
  - smoke-test
  - web
longDescription: |
  A smoke-test agent designed for the Codebolt platform. When invoked, it
  creates a small static site artifact with an HTML entrypoint and README file.
avatarSrc: https://placehold.co/200x200
avatarFallback: AA
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: false
    supportedlanguages:
      - web
    supportedframeworks:
      - html
    supportRemix: true
  defaultagentllm:
    strict: true
    modelorder:
      - ollama2
  sdlc_steps_managed:
    - name: deployment
      example_instructions:
        - create artifact
  llm_role:
    - name: documentationllm
      description: >-
        LLM to be used for advanced Documentation. Please select a model that
        excels in documentation tasks.
      strict: true
      modelorder:
        - gpt-4-turbo
        - gpt-3.5-turbo
        - mistral7b.perplexity
        - mistral7b.any
        - llama2-70b
        - llama2-15b
        - group.documentationmodels
    - name: testingllm
      description: >-
        LLM to be used for advanced Testing. Please select a model that excels
        in testing tasks.
      strict: true
      modelorder:
        - gpt-4-turbo
        - gpt-3.5-turbo
        - mistral7b.perplexity
        - mistral7b.any
        - llama2-70b
        - llama2-15b
        - group.testingmodels
    - name: actionllm
      description: LLM to be used for executing advanced actions.
      strict: true
      modelorder:
        - gpt-4-turbo
        - gpt-3.5-turbo
        - mistral7b.perplexity
        - mistral7b.any
        - llama2-70b
        - llama2-15b
        - group.actionmodels
actions:
  - name: Create Artifact
    description: Creates a static site artifact.
    detailDescription: Creates a static site artifact through the Codebolt artifact API.
    actionPrompt: Please create a static site artifact
supportRemix: true
author: Codebolt Team

# Pre-completion verification configuration
# Inspired by patterns from Aider, SWE-agent, Gemini CLI, and Windsurf
verification:
  enabled: true
  # Run all checks before allowing task completion
  checks:
    lint: true       # Run linter (eslint, flake8, golangci-lint, etc.)
    test: true       # Run test suite (npm test, pytest, go test, etc.)
    build: true      # Run build (npm run build, go build, cargo build, etc.)
    typecheck: true  # Run type checker (tsc, mypy, etc.)
  # Timeout per check in milliseconds
  timeout: 60000
  # Skip verification if no project config found (package.json, etc.)
  skipOnNoConfig: true
  # Skip verification for non-code tasks (docs, config changes only)
  skipForNonCodeTasks: true
  # Maximum retries not limited (-1 = keep retrying until fixed)
  maxRetries: -1
