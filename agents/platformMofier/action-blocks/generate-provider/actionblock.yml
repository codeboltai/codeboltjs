name: platformMofier-generate-provider
description: Generates a CodeBolt environment provider scaffold.
version: 1.0.0
entryPoint: dist/index.js
metadata:
  executionModel: side-execution-mini-agent
  feature: provider
  agentLoop:
    reference: /Users/ravirawat/Documents/codeboltai/AiEditor/codeboltjs/agents/act-updated
    steps:
      - plan
      - write
      - verify
      - repair-if-needed
  inputs:
    - name: spec
      type: object
      required: true
  outputs:
    - name: success
      type: boolean
    - name: artifactPath
      type: string
    - name: filesCreated
      type: array
