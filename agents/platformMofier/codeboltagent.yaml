title: PlatformMofier
version: 1.0.0
unique_id: platformMofier
initial_message: I create CodeBolt platform artifacts through internal ActionBlock mini-agents.
description: Platform-aware generator for custom agents, plugins, LLM providers, web search providers, environment providers, dynamic UI panels, and ActionBlocks.
tags:
  - platform
  - generator
  - actionblocks
  - plugins
  - agents
longDescription: |
  PlatformMofier is a CodeBolt platform generator. It plans requests and delegates
  every creation action to an internal ActionBlock side execution. The internal
  ActionBlocks use feature-specific platform knowledge and an agentic
  plan/write/verify/repair loop.
avatarSrc: https://placehold.co/200x200
avatarFallback: PM
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - yaml
    supportedframeworks:
      - codebolt
  sdlc_steps_managed:
    - name: platform-generation
      example_instructions:
        - create a CodeBolt agent
        - create a custom LLM provider plugin
        - create a web search provider plugin
        - create a dynamic panel plugin
actions:
  - name: Generate Platform Artifact
    description: Creates CodeBolt platform artifacts via internal ActionBlocks.
    detailDescription: Parses the request, builds normalized specs, and invokes internal ActionBlock mini-agents by path.
    actionPrompt: Create a CodeBolt platform artifact.
author: ravi
