title: PlatformMofier
version: 1.0.0
unique_id: platformMofier
description: Generic CodeBolt agent with platform-generation routing for custom agents, plugins, LLM providers, web search providers, environment providers, dynamic UI panels, and ActionBlocks.
tags:
  - platform
  - generator
  - actionblocks
  - plugins
  - agents
longDescription: |
  PlatformMofier is a generic CodeBolt agent with an extra platform-generation
  capability. It answers ordinary requests directly and delegates artifact
  creation to the correct internal ActionBlock side execution. The internal
  ActionBlocks use feature-specific platform knowledge and an agentic
  plan/write/verify/repair loop.
avatarSrc: https://placehold.co/200x200
avatarFallback: PM
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - yaml
    supportedframeworks:
      - codebolt
  sdlc_steps_managed:
    - name: platform-generation
      example_instructions:
        - create a CodeBolt agent
        - create a custom LLM provider plugin
        - create a web search provider plugin
        - create a dynamic panel plugin
        - create an ActionBlock
actions:
  - name: Generate Platform Artifact
    description: Answers directly or creates CodeBolt platform artifacts via internal ActionBlocks.
    detailDescription: Decides whether to answer directly or build normalized specs and invoke the matching internal ActionBlock mini-agents by path.
    actionPrompt: Answer directly unless the request needs a CodeBolt platform artifact; then route to the right ActionBlock.
author: ravi
