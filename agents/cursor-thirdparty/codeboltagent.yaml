title: Cursor Third-Party Agent
version: 1.0.0
unique_id: cursor-thirdparty
initial_message: |
  I'm a Cursor agent powered by @codebolt/thirdpartyagents.
  I run Cursor Agent CLI as a child process and stream results through Codebolt.
  Tell me what you'd like to work on.
description: Agent using @codebolt/thirdpartyagents to run Cursor Agent CLI with automatic Codebolt communication.
tags:
  - coding
  - cli
  - cursor
  - thirdparty
longDescription: |
  This agent uses the @codebolt/thirdpartyagents library to run
  Cursor Agent CLI as a child process. The library automatically handles all
  Codebolt communication (notifications, text streaming, etc.) while also
  streaming messages for optional additional processing.
avatarSrc: https://placehold.co/200x200
avatarFallback: CR
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - python
      - go
      - rust
      - java
    supportedframeworks:
      - react
      - node
      - express
      - nextjs
    supportRemix: true
  defaultagentllm:
    strict: false
    modelorder:
      - composer-1.5
      - gpt-5.3-codex
      - claude-sonnet-4-6
actions:
  - name: Plan
    description: Enter plan mode
    detailDescription: Run Cursor in planning mode
    actionPrompt: /plan
  - name: Ask
    description: Ask a question
    detailDescription: Run Cursor in ask mode (no code changes)
    actionPrompt: /ask
supportRemix: true
author: codebolt
