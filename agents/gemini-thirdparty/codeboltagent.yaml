title: Gemini Third-Party Agent
version: 1.0.0
unique_id: gemini-thirdparty
initial_message: |
  I'm a Google Gemini agent powered by @codebolt/thirdpartyagents.
  I run Gemini CLI as a child process and stream results through Codebolt.
  Tell me what you'd like to work on.
description: Agent using @codebolt/thirdpartyagents to run Google Gemini CLI with automatic Codebolt communication.
tags:
  - coding
  - cli
  - gemini
  - google
  - thirdparty
longDescription: |
  This agent uses the @codebolt/thirdpartyagents library to run
  Google Gemini CLI as a child process. The library automatically handles all
  Codebolt communication (notifications, text streaming, etc.) while also
  streaming messages for optional additional processing.
avatarSrc: https://placehold.co/200x200
avatarFallback: GM
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - python
      - go
      - rust
      - java
    supportedframeworks:
      - react
      - node
      - express
      - nextjs
    supportRemix: true
  defaultagentllm:
    strict: false
    modelorder:
      - gemini-2.5-pro
      - gemini-2.5-flash
      - gemini-2.0-flash
supportRemix: true
author: codebolt
