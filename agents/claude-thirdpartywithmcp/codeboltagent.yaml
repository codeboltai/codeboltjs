title: Claude Code
version: 1.0.0
unique_id: claude-thirdpartywithmcp
initial_message: |
  I'm a Claude Code agent with full access to Codebolt tools via MCP.
  Claude Code can use Codebolt's filesystem, terminal, git, browser,
  memory, tasks, threads, and more - all routed through the Codebolt platform.
  Tell me what you'd like to work on.
description: Claude Code agent with Codebolt tools exposed via MCP server. Claude Code gets access to all Codebolt platform capabilities.
tags:
  - coding
  - cli
  - claude
  - mcp
  - thirdparty
longDescription: |
  This agent starts a Codebolt MCP server in-process, then spawns Claude Code
  with --mcp-config pointing to it. Claude Code discovers all Codebolt tools
  (filesystem, terminal, git, browser, memory, tasks, etc.) via MCP and can
  use them during execution. All tool calls flow through the Codebolt platform
  with UI confirmations and notifications.
avatarSrc: https://placehold.co/200x200
avatarFallback: CM
metadata:
  agent_routing:
    worksonblankcode: true
    worksonexistingcode: true
    supportedlanguages:
      - javascript
      - typescript
      - python
      - go
      - rust
      - java
    supportedframeworks:
      - react
      - node
      - express
      - nextjs
    supportRemix: true
  defaultagentllm:
    strict: false
    modelorder:
      - claude-sonnet-4-20250514
      - claude-3-5-sonnet-20241022
actions:
  - name: Plan
    description: Enter plan mode
    detailDescription: Run Claude in planning mode (no tool execution)
    actionPrompt: /plan
  - name: Execute
    description: Execute a task
    detailDescription: Run Claude with full permissions and Codebolt MCP tools
    actionPrompt: Let's build this
supportRemix: true
author: codebolt
