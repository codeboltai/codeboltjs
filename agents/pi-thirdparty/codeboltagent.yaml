title: Pi Third-Party Agent
version: 1.0.0
unique_id: pi-thirdparty
initial_message: |
  I'm a Pi AI agent powered by @codebolt/thirdpartyagents.
  I run Pi CLI as a child process and stream results through Codebolt.
  Tell me what you'd like to work on.
description: Agent using @codebolt/thirdpartyagents to run Pi AI Agent CLI with automatic Codebolt communication.
tags:
  - coding
  - cli
  - pi
  - thirdparty
longDescription: |
  This agent uses the @codebolt/thirdpartyagents library to run
  Pi AI Agent CLI as a child process. The library automatically handles all
  Codebolt communication (notifications, tool dispatching, text streaming, etc.)
  while also streaming messages for optional additional processing.
